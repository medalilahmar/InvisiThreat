server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy vers le backend FastAPI (toutes les routes API)
    location /defectdojo/ {
        proxy_pass http://risk-scoring-engine-svc:8081/defectdojo/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    location /predict {
        proxy_pass http://risk-scoring-engine-svc:8081/predict;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    location /auth/ {
        proxy_pass http://risk-scoring-engine-svc:8081/auth/;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    location /llm/ {
        proxy_pass http://risk-scoring-engine-svc:8081/llm/;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    location /jira/ {
        proxy_pass http://risk-scoring-engine-svc:8081/jira/;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    location /admin/ {
        proxy_pass http://risk-scoring-engine-svc:8081/admin/;
        proxy_set_header Host $host;
    }

    location /analytics/ {
        proxy_pass http://risk-scoring-engine-svc:8081/analytics/;
        proxy_set_header Host $host;
    }

    location /notifications/ {
        proxy_pass http://risk-scoring-engine-svc:8081/notifications/;
        proxy_set_header Host $host;
    }

    location /model/ {
        proxy_pass http://risk-scoring-engine-svc:8081/model/;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://risk-scoring-engine-svc:8081/health;
    }

    location /metrics {
        proxy_pass http://risk-scoring-engine-svc:8081/metrics;
    }

    # Cache pour les assets statiques React
    location ~* \.(js|css|png|jpg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing - toutes les autres routes vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml application/xml;
}