server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── API Backend ───────────────────────────────────────

    location /defectdojo/ {
        proxy_pass http://risk-scoring-engine-svc:8081/defectdojo/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    location /predict {
        proxy_pass http://risk-scoring-engine-svc:8081/predict;
        proxy_set_header Host $http_host;
        proxy_read_timeout 120s;
    }

    location /findings/ {
        proxy_pass http://risk-scoring-engine-svc:8081/findings/;
        proxy_set_header Host $http_host;
        proxy_read_timeout 60s;
    }

    location /projects/ {
        proxy_pass http://risk-scoring-engine-svc:8081/projects/;
        proxy_set_header Host $http_host;
        proxy_read_timeout 30s;
    }

    location /auth/ {
        proxy_pass http://risk-scoring-engine-svc:8081/auth/;
        proxy_set_header Host $http_host;
        proxy_read_timeout 30s;
    }

    location /llm/ {
        proxy_pass http://risk-scoring-engine-svc:8081/llm/;
        proxy_set_header Host $http_host;
        proxy_read_timeout 300s;
    }

    location /jira/ {
        proxy_pass http://risk-scoring-engine-svc:8081/jira/;
        proxy_set_header Host $http_host;
        proxy_read_timeout 60s;
    }

    # ── Admin : SPA pour la navigation, API pour les appels React ────────
    location /admin/ {
        if ($http_accept ~* "text/html") {
            rewrite ^ /index.html last;
        }
        proxy_pass http://risk-scoring-engine-svc:8081/admin/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /analytics/ {
        proxy_pass http://risk-scoring-engine-svc:8081/analytics/;
        proxy_set_header Host $http_host;
    }

    location /notifications/ {
        proxy_pass http://risk-scoring-engine-svc:8081/notifications/;
        proxy_set_header Host $http_host;
    }

    location /model/ {
        proxy_pass http://risk-scoring-engine-svc:8081/model/;
        proxy_set_header Host $http_host;
    }

    location /data/ {
        proxy_pass http://risk-scoring-engine-svc:8081/data/;
        proxy_set_header Host $http_host;
    }

    location /cache/ {
        proxy_pass http://risk-scoring-engine-svc:8081/cache/;
        proxy_set_header Host $http_host;
    }

    location /health {
        proxy_pass http://risk-scoring-engine-svc:8081/health;
    }

    location /ready {
        proxy_pass http://risk-scoring-engine-svc:8081/ready;
    }

    location /metrics {
        proxy_pass http://risk-scoring-engine-svc:8081/metrics;
    }

    location /docs {
        proxy_pass http://risk-scoring-engine-svc:8081/docs;
    }

    location /openapi.json {
        proxy_pass http://risk-scoring-engine-svc:8081/openapi.json;
    }

    # ── Assets statiques React ───────────────────────────
    location ~* \.(js|css|png|jpg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback ─────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }


    location /recommend/llm {
        proxy_pass http://risk-scoring-engine-svc:8081/recommend/llm;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /explain/llm {
        proxy_pass http://risk-scoring-engine-svc:8081/explain/llm;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml application/xml;
}