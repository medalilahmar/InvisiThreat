apiVersion: v1
kind: Service
metadata:
  name: defectdojo-external
  namespace: invisithreat
spec:
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
---
# L'IP sera mise à jour dynamiquement par le pipeline
# via kubectl patch avant chaque déploiement
apiVersion: v1
kind: Endpoints
metadata:
  name: defectdojo-external
  namespace: invisithreat
subsets:
  - addresses:
      - ip: "127.0.0.1"    # sera remplacé par le pipeline avec l'IP réelle du noeud
    ports:
      - port: 8080