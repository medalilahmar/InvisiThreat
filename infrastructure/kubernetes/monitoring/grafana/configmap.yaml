---
# ============================================================
# Grafana - ConfigMap
# Fichier : kubernetes/monitoring/grafana/configmap.yaml
# Description : Configuration de Grafana
#               Datasources Prometheus et Loki préconfigurées
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    app: grafana
    managed-by: ansible
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:

      # --------------------------------------------------
      # Prometheus - métriques
      # --------------------------------------------------
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: false

      # --------------------------------------------------
      # Loki - logs
      # --------------------------------------------------
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: monitoring
  labels:
    app: grafana
    managed-by: ansible
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: InvisiThreat
        orgId: 1
        folder: InvisiThreat
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-kubernetes
  namespace: monitoring
  labels:
    app: grafana
    managed-by: ansible
data:
  kubernetes.json: |
    {
      "title": "InvisiThreat - Monitoring",
      "uid": "invisithreat-k8s",
      "panels": [
        {
          "title": "CPU Usage (nœud)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [{
            "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
            "legendFormat": "CPU %"
          }]
        },
        {
          "title": "Mémoire utilisée (nœud)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [{
            "expr": "(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100",
            "legendFormat": "Mémoire %"
          }]
        },
        {
          "title": "Disque utilisé %",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 8},
          "targets": [{
            "expr": "100 - (node_filesystem_avail_bytes{mountpoint=\"/\"} / node_filesystem_size_bytes{mountpoint=\"/\"} * 100)",
            "legendFormat": "Disque %"
          }]
        },
        {
          "title": "Uptime nœud",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 8},
          "targets": [{
            "expr": "time() - node_boot_time_seconds",
            "legendFormat": "Uptime (s)"
          }]
        }
      ],
      "schemaVersion": 38,
      "version": 1
    }