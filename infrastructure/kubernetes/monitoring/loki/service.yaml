---
# ============================================================
# Loki - Service
# Fichier : kubernetes/monitoring/loki/service.yaml
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: monitoring
  labels:
    app: loki
    managed-by: ansible
spec:
  selector:
    app: loki
  ports:
    - port: 3100
      targetPort: 3100
  type: ClusterIP