apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: monitoring
  labels:
    app: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
          env:
            - name: POSTGRES_PASSWORD        # ✅ EN PREMIER
              valueFrom:
                secretKeyRef:
                  name: postgres-exporter-secret   # ✅ namespace monitoring
                  key: POSTGRES_PASSWORD
            - name: DATA_SOURCE_NAME         # ✅ APRÈS
              value: "postgresql://invisithreat:$(POSTGRES_PASSWORD)@postgres-svc.invisithreat.svc.cluster.local:5432/invisithreat?sslmode=disable"
          ports:
            - containerPort: 9187
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: monitoring
  labels:
    app: postgres-exporter
spec:
  ports:
    - port: 9187
      targetPort: 9187
  selector:
    app: postgres-exporter