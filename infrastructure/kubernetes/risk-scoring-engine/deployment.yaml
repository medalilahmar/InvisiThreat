apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-scoring-engine
  namespace: invisithreat
  labels:
    app: risk-scoring-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: risk-scoring-engine
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: risk-scoring-engine
    spec:
      containers:
        - name: api
          image: localhost:5000/invisithreat/risk-scoring-engine:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081

          # Injection automatique de toutes les variables
          envFrom:
            - configMapRef:
                name: invisithreat-config
            - secretRef:
                name: invisithreat-secrets

          # Seule variable construite dynamiquement
          env:
            - name: DATABASE_URL
              value: "postgresql://invisithreat:$(POSTGRES_PASSWORD)@postgres-svc:5432/invisithreat"

          volumeMounts:
            - name: models-storage
              mountPath: /app/models
            - name: data-storage
              mountPath: /app/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1.5Gi"
              cpu: "800m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
            successThreshold: 1
      volumes:
        - name: models-storage
          persistentVolumeClaim:
            claimName: pvc-models
        - name: data-storage
          persistentVolumeClaim:
            claimName: pvc-data