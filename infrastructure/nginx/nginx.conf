# ─────────────────────────────────────────────────────────────────
#  InvisiThreat – nginx.conf
#  Reverse proxy unique pour dashboard React et API FastAPI
# ─────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Logs structurés
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Compression gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Upstream pools ──────────────────────────────────────────
    upstream dashboard_upstream {
        server dashboard:80;
    }

    upstream api_upstream {
        server api:8081;
    }

    # ── Serveur principal ───────────────────────────────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 50M;

        # ── Dashboard React (SPA) ──────────────────────────────
        location / {
            proxy_pass http://dashboard_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # SPA : toujours servir index.html pour les routes client-side
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }

        # ── API FastAPI (risk-scoring-engine) ──────────────────
        # Le frontend appelle /api/* → on strip /api et on transmet à :8081
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts augmentés pour le scoring initial au démarrage
            proxy_read_timeout    120s;
            proxy_connect_timeout  10s;
            proxy_send_timeout     60s;
        }

        # ── Health check nginx ─────────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}