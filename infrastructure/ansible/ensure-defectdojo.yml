- name: Ensure DefectDojo is running and ready
  hosts: localhost
  connection: local
  gather_facts: yes
  vars:
    dojo_path: "/home/medalilahmar/Desktop/django-DefectDojo"

  tasks:
    - name: Vérifier si DefectDojo est accessible
      uri:
        url: http://localhost:8080/api/v2/
        method: GET
        status_code: 200
        timeout: 5
      register: api_result
      ignore_errors: yes

    - name: DefectDojo est déjà actif
      debug:
        msg: " DefectDojo est déjà actif"
      when: api_result.status == 200

    - name: Démarrer DefectDojo si non accessible
      when: api_result.status != 200
      block:
        - name: Aller dans le dossier et démarrer les conteneurs
          shell: |
            cd {{ dojo_path }}
            docker compose up -d
          register: compose_result

        - name: Attendre que l'API DefectDojo soit disponible
          uri:
            url: http://localhost:8080/api/v2/
            method: GET
            status_code: 200
            timeout: 5
          register: api_wait
          until: api_wait.status == 200
          retries: 60
          delay: 5

        - name: Afficher le statut
          debug:
            msg: " DefectDojo démarré avec succès"