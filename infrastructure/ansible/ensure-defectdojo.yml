- name: Ensure DefectDojo is running and ready
  hosts: all
  connection: local
  gather_facts: yes
  vars:
    ansible_user: "{{ lookup('env', 'USER') | default('medalilahmar', true) }}"
  
  tasks:
    - name: Vérifier si DefectDojo est accessible
      uri:
        url: http://localhost:8080/api/v2/
        method: GET
        status_code: 200
        timeout: 5
      register: api_result
      ignore_errors: yes

    - name: Afficher le statut
      debug:
        msg: "DefectDojo est prêt sur http://localhost:8080"
      when: api_result.status is defined and api_result.status == 200

    - name: Avertissement si DefectDojo indisponible
      fail:
        msg: "DefectDojo n'est pas accessible. Vérifiez que les conteneurs sont démarrés."
      when: api_result.status is not defined or api_result.status != 200