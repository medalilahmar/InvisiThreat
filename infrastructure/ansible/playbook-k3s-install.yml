---
- name: Installation k3s et configuration pour InvisiThreat
  hosts: localhost
  become: yes
  roles:
    - k3s

  post_tasks:
    - name: Résumé de l'installation
      debug:
        msg: |
          ================================================
          k3s installé et prêt !
          kubectl est disponible pour l'utilisateur {{ ansible_user }}
          Kubeconfig : /home/{{ ansible_user }}/.kube/config
          Dashboard   : http://localhost:30080
          API FastAPI : http://localhost:30081
          ================================================