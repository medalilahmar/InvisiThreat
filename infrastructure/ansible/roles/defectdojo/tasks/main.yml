---
- name: Mise à jour du cache apt
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Installer les dépendances pour le dépôt Docker
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - git
    state: present

- name: Créer le répertoire pour la clé GPG Docker
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Ajouter la clé GPG officielle Docker
  ansible.builtin.shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Ajouter le dépôt officiel Docker
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Installer Docker CE et le plugin Compose (v2)
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Démarrage et activation de Docker au boot
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes

- name: Ajouter l'utilisateur au groupe docker
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes

- name: Créer le répertoire Desktop si nécessaire
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/Desktop"
    state: directory
    mode: "0755"

- name: Vérifier si DefectDojo est déjà cloné
  ansible.builtin.stat:
    path: "/home/{{ ansible_user }}/Desktop/django-DefectDojo/docker-compose.yml"
  register: defectdojo_exists

- name: Cloner le dépôt DefectDojo
  ansible.builtin.git:
    repo: https://github.com/DefectDojo/django-DefectDojo.git
    dest: "/home/{{ ansible_user }}/Desktop/django-DefectDojo"
    version: master
    force: yes
  when: not defectdojo_exists.stat.exists

- name: Créer le service systemd DefectDojo
  ansible.builtin.template:
    src: defectdojo.service.j2
    dest: /etc/systemd/system/defectdojo.service
    mode: '0644'
  notify: reload systemd

- name: Activer et démarrer le service DefectDojo
  ansible.builtin.systemd:
    name: defectdojo.service
    enabled: yes
    state: started
    daemon_reload: yes

- name: Attendre que l'API DefectDojo soit disponible
  ansible.builtin.uri:
    url: http://localhost:8080/api/v2/
    method: GET
    status_code: 200
    timeout: 5
  register: api_result
  until: api_result.status == 200
  retries: 60
  delay: 5

- name: Afficher le statut final
  ansible.builtin.debug:
    msg: "DefectDojo est prêt sur http://{{ ansible_host | default('localhost') }}:8080"