---
# ============================================================
# Rôle : monitoring
# Fichier : tasks/main.yml
# Description : Installe Prometheus + Grafana + Loki
# ============================================================

# ------------------------------------------------------------
# 1. Créer le namespace monitoring
# ------------------------------------------------------------
- name: Créer le namespace monitoring
  command: >
    kubectl apply -f
    /home/{{ ansible_user }}/infrastructure/kubernetes/monitoring/namespace.yaml
  become: false
  environment:
    KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"

# ------------------------------------------------------------
# 2. Déployer Prometheus
# ------------------------------------------------------------
- name: Appliquer la ConfigMap Prometheus
  command: >
    kubectl apply -f
    /home/{{ ansible_user }}/infrastructure/kubernetes/monitoring/prometheus/configmap.yaml
  become: false
  environment:
    KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"

- name: Appliquer le Deployment Prometheus
  command: >
    kubectl apply -f
    /home/{{ ansible_user }}/infrastructure/kubernetes/monitoring/prometheus/deployment.yaml
  become: false
  environment:
    KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"

- name: Appliquer le Service Prometheus
  command: >
    kubectl apply -f
    /home/{{ ansible_user }}/infrastructure/kubernetes/monitoring/prometheus/service.yaml
  become: false
  environment:
    KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"

# ------------------------------------------------------------
# 3. Attendre que Prometheus soit prêt
# ------------------------------------------------------------
- name: Attendre que Prometheus soit prêt
  command: >
    kubectl rollout status deployment/prometheus
    -n monitoring
    --timeout=120s
  become: false
  environment:
    KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"
  register: prometheus_ready
  retries: 5
  delay: 15
  until: prometheus_ready.rc == 0

# ------------------------------------------------------------
# 4. Déployer Grafana
# ------------------------------------------------------------
- name: Appliquer la ConfigMap Grafana
  command: >
    kubectl apply -f
    /home/{{ ansible_user }}/infrastructure/kubernetes/monitoring/grafana/configmap.yaml
  become: false
  environment:
    KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"

- name: Appliquer le Deployment Grafana
  command: >
    kubectl apply -f
    /home/{{ ansible_user }}/infrastructure/kubernetes/monitoring/grafana/deployment.yaml
  become: false
  environment:
    KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"

- name: Appliquer le Service Grafana
  command: >
    kubectl apply -f
    /home/{{ ansible_user }}/infrastructure/kubernetes/monitoring/grafana/service.yaml
  become: false
  environment:
    KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"

# ------------------------------------------------------------
# 5. Attendre que Grafana soit prêt
# ------------------------------------------------------------
- name: Attendre que Grafana soit prêt
  command: >
    kubectl rollout status deployment/grafana
    -n monitoring
    --timeout=120s
  become: false
  environment:
    KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"
  register: grafana_ready
  retries: 5
  delay: 15
  until: grafana_ready.rc == 0

# ------------------------------------------------------------
# 6. Déployer Loki
# ------------------------------------------------------------
- name: Appliquer le Deployment Loki et Promtail
  command: >
    kubectl apply -f
    /home/{{ ansible_user }}/infrastructure/kubernetes/monitoring/loki/deployment.yaml
  become: false
  environment:
    KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"

- name: Appliquer le Service Loki
  command: >
    kubectl apply -f
    /home/{{ ansible_user }}/infrastructure/kubernetes/monitoring/loki/service.yaml
  become: false
  environment:
    KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"

# ------------------------------------------------------------
# 7. Attendre que Loki soit prêt
# ------------------------------------------------------------
- name: Attendre que Loki soit prêt
  command: >
    kubectl rollout status deployment/loki
    -n monitoring
    --timeout=120s
  become: false
  environment:
    KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"
  register: loki_ready
  retries: 5
  delay: 15
  until: loki_ready.rc == 0

# ------------------------------------------------------------
# 8. Appliquer l'Ingress monitoring
# ------------------------------------------------------------
- name: Appliquer l'Ingress monitoring
  command: >
    kubectl apply -f
    /home/{{ ansible_user }}/infrastructure/kubernetes/monitoring/ingress/monitoring-ingress.yaml
  become: false
  environment:
    KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"

# ------------------------------------------------------------
# 9. Vérification finale
# ------------------------------------------------------------
- name: Vérifier les pods monitoring
  command: kubectl get pods -n monitoring
  become: false
  environment:
    KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"
  register: monitoring_pods

- name: Afficher les pods monitoring
  debug:
    msg: "{{ monitoring_pods.stdout }}"

# ------------------------------------------------------------
# 10. Résumé final
# ------------------------------------------------------------
- name: Résumé installation monitoring
  debug:
    msg: |
      ================================================
      Monitoring installé et prêt !

      Grafana    : http://monitoring.invisithreat.local
      Login      : admin
      Mot de passe : invisithreat2024

      Dashboards disponibles :
      → InvisiThreat - Kubernetes
        (CPU, mémoire, redémarrages des pods)

      Datasources préconfigurées :
      → Prometheus (métriques)
      → Loki (logs)
      ================================================