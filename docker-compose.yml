version: "3.9"



networks:
  invisithreat_net:
    driver: bridge

volumes:
  models_data:    
  scores_cache:   
  api_logs:       

services:

  nginx:
    image: nginx:alpine
    container_name: invisithreat_nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dashboard
      - api
    networks:
      - invisithreat_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: ./security-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: invisithreat_dashboard
    networks:
      - invisithreat_net
    restart: unless-stopped

  api:
    build:
      context: ./risk-scoring-engine
      dockerfile: Dockerfile
    container_name: invisithreat_api
    env_file: .env
    environment:
      DEFECTDOJO_URL: http://192.168.11.170:8080
      MODEL_PATH: ${MODEL_PATH:-models/pipeline_latest.pkl}
      META_PATH: ${META_PATH:-models/pipeline_latest_meta.json}
      CSV_FINDINGS_PATH: ${CSV_FINDINGS_PATH:-data/processed/findings_clean.csv}
      CACHE_TTL_PRODUCTS: ${CACHE_TTL_PRODUCTS:-300}
      CACHE_TTL_TESTS: ${CACHE_TTL_TESTS:-300}
      CACHE_TTL_FINDINGS: ${CACHE_TTL_FINDINGS:-60}
      SCORES_CACHE_TTL: ${SCORES_CACHE_TTL:-60}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-100}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      API_PORT: "8081"
      API_HOST: "0.0.0.0"
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      JIRA_SERVER: ${JIRA_SERVER:-}
      JIRA_USER: ${JIRA_USER:-}
      JIRA_API_KEY: ${JIRA_API_KEY:-}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY:-SEC}
    volumes:
      - models_data:/app/models
      - scores_cache:/app/data
      - api_logs:/app/logs
    networks:
      - invisithreat_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s