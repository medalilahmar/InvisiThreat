# ──────────────────────────────────────────────────────────────────────
#  campusConnect — project.config.yml
# ──────────────────────────────────────────────────────────────────────

project:
  name: "CampusConnect"
  description: "Spring Boot vulnérable — SAST/SCA/DAST (Log4Shell, SQLi, XSS, Deserialization)"
  type: "java"

app:
  port: 8090
  install_dir: ""
  start_command: "mvn spring-boot:run -Dspring-boot.run.arguments=--server.port=8090 -q"
  health_check_path: "/api/v1/users/health"
  startup_wait: 60

security:
  fail_on_new_critical: false
  fail_on_new_high: false

  semgrep_rulesets:
    - "p/security-audit"
    - "p/owasp-top-ten"
    - "p/java"
    - "p/secrets"

  snyk_severity_threshold: "low"

  zap_full_scan_timeout: 10
  zap_jwt_login_endpoint: ""
  zap_jwt_login_body: ""
  zap_jwt_token_path: ".token"
  zap_openapi_endpoint: ""