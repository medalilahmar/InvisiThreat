# ══════════════════════════════════════════════════════════════════════════════
#  project.config.yml — Configuration d'un projet pour le pipeline DevSecOps
#
#  Ce fichier est lu par l'action load-config (.github/actions/load-config)
#  et pilote l'ensemble du pipeline : installation, démarrage, scans sécurité.
#
#  ► Un fichier par projet, placé dans : projects/<nom-projet>/project.config.yml
#  ► Tous les champs ont une valeur par défaut (voir commentaires inline).
#  ► Pour désactiver une fonctionnalité, laisser la valeur vide : ""
# ══════════════════════════════════════════════════════════════════════════════



# ─────────────────────────────────────────────────────────────────────────────
#  SECTION 1 — IDENTITÉ DU PROJET
#  Utilisée pour nommer le produit et l'engagement dans DefectDojo.
# ─────────────────────────────────────────────────────────────────────────────
project:

  # Nom affiché dans DefectDojo (produ  name: "Nova"

  # Description courte du projet — visible dans DefectDojo.
  description: "Nova - Application Python vulnérable pour tests SAST/DAST/SCA"

  # Type de projet — détermine le gestionnaire de dépendances utilisé.
  type: "python"


# ─────────────────────────────────────────────────────────────────────────────
#  SECTION 2 — APPLICATION
#  Paramètres de démarrage de l'application pour le DAST (ZAP).
# ─────────────────────────────────────────────────────────────────────────────
app:

  # Port TCP sur lequel l'application écoute en local (défini dans src/nova/app.py).
  port: 5001

  # Sous-dossier contenant les fichiers d'installation (requirements.txt).
  # Laissé vide "" car ils sont à la racine du projet.
  install_dir: ""

  # Commande shell pour démarrer l'application Flask.
  start_command: "FLASK_APP=src/nova/app.py flask run --host=0.0.0.0 --port=5001"

  # Chemin HTTP pour vérifier que l'application est prête (health check).
  # La racine "/" retourne une réponse 200 et convient parfaitement.
  health_check_path: "/"

  # Délai d'attente initial (en secondes) avant les tentatives de health check.
  startup_wait: 15


# ─────────────────────────────────────────────────────────────────────────────
#  SECTION 3 — SÉCURITÉ
#  Configure les outils de scan et les seuils du Security Gate.
# ─────────────────────────────────────────────────────────────────────────────
security:

  # ── Security Gate ──────────────────────────────────────────────────────────

  # Bloquer le pipeline si au moins 1 nouveau finding Critical est détecté.
  fail_on_new_critical: true

  # Bloquer le pipeline si au moins 1 nouveau finding High est détecté.
  fail_on_new_high: false

  # ── SAST — Semgrep ─────────────────────────────────────────────────────────

  # Liste des rulesets Semgrep à appliquer lors du scan SAST.
  # Remplacement des règles Node.js par les règles spécifiques à Python et aux secrets.
  semgrep_rulesets:
    - "p/security-audit"   # Règles génériques de sécurité (tous langages)
    - "p/owasp-top-ten"    # Couverture des 10 risques OWASP les plus critiques
    - "p/python"           # Règles spécifiques Python (injections, fonctions dangereuses)
    - "p/secrets"          # Détection de secrets hardcodés

  # ── SCA — Snyk ─────────────────────────────────────────────────────────────

  # Seuil de sévérité minimum pour que Snyk remonte une vulnérabilité.
  snyk_severity_threshold: "low"

  # ── DAST — ZAP ─────────────────────────────────────────────────────────────

  # Durée maximale (en minutes) du ZAP Full Scan.
  zap_full_scan_timeout: 15

  # Pas d'authentification JWT requise pour les endpoints basiques de test.
  zap_jwt_login_endpoint: ""
  zap_jwt_login_body: ""
  zap_jwt_token_path: ".token"

  # Laisser vide "" pour désactiver le scan OpenAPI (si pas de Swagger/OpenAPI).
  # Exemples : "/api/v1", "/b2b/v2", "/rest"
  # Défaut : "" (scan OpenAPI ignoré)
  zap_openapi_endpoint: ""