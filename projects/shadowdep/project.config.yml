# projects/shadowdep/project.config.yml
#  ► Un fichier par projet, placé dans : projects/<nom-projet>/project.config.yml

project:
  name: "ShadowDep"
  description: "ShadowDep internal dashboard - backend API server"
  type: "nodejs"

app:
  port: 5001
  install_dir: "backend"
  start_command: "node backend/app.js --host 0.0.0.0"
  health_check_path: "/health"
  startup_wait: 10

security:
  fail_on_new_critical: true
  fail_on_new_high: false
  semgrep_rulesets:
    - "p/security-audit"
    - "p/owasp-top-ten"
    - "p/nodejs"
  snyk_severity_threshold: "low"
  zap_full_scan_timeout: 30
  zap_jwt_login_endpoint: ""
  zap_jwt_login_body: ""
  zap_jwt_token_path: ".token"
  zap_openapi_endpoint: ""