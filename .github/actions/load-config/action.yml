name: Load Project Config
description: "Lit le fichier project.config.yml d'un projet et expose ses valeurs en outputs"

inputs:
  project:
    description: "Nom du projet (ex: juice-shop)"
    required: true
  projects_dir:
    description: "Dossier racine des projets (ex: projects)"
    required: false
    default: projects

outputs:
  project_name:
    description: "Nom du produit dans DefectDojo"
    value: ${{ steps.parse.outputs.project_name }}
  project_description:
    description: "Description du produit DefectDojo"
    value: ${{ steps.parse.outputs.project_description }}
  project_type:
    description: "Type de projet (nodejs | python | java | static)"
    value: ${{ steps.parse.outputs.project_type }}
  app_dir:
    description: "Chemin vers le dossier du projet"
    value: ${{ steps.parse.outputs.app_dir }}
  app_port:
    description: "Port de l'application"
    value: ${{ steps.parse.outputs.app_port }}
  start_command:
    description: "Commande pour démarrer l'app"
    value: ${{ steps.parse.outputs.start_command }}
  health_path:
    description: "Chemin health check"
    value: ${{ steps.parse.outputs.health_path }}
  startup_wait:
    description: "Secondes d'attente au démarrage"
    value: ${{ steps.parse.outputs.startup_wait }}
  target_url:
    description: "URL cible pour ZAP"
    value: ${{ steps.parse.outputs.target_url }}
  fail_on_new_critical:
    description: "Bloquer si nouveau Critical"
    value: ${{ steps.parse.outputs.fail_on_new_critical }}
  fail_on_new_high:
    description: "Bloquer si nouveau High"
    value: ${{ steps.parse.outputs.fail_on_new_high }}
  semgrep_configs:
    description: "Rulesets Semgrep séparés par virgule"
    value: ${{ steps.parse.outputs.semgrep_configs }}
  snyk_threshold:
    description: "Seuil de sévérité Snyk"
    value: ${{ steps.parse.outputs.snyk_threshold }}
  zap_timeout:
    description: "Timeout ZAP en minutes"
    value: ${{ steps.parse.outputs.zap_timeout }}
  install_dir:
    description: "Chemin vers le dossier d'installation (package.json / requirements.txt / pom.xml)"
    value: ${{ steps.parse.outputs.install_dir }}
  install_command:
    description: "Commande d'installation des dépendances"
    value: ${{ steps.parse.outputs.install_command }}
  zap_jwt_login_endpoint:
    description: "Endpoint POST login pour ZAP"
    value: ${{ steps.parse.outputs.zap_jwt_login_endpoint }}
  zap_jwt_login_body:
    description: "Body JSON login pour ZAP"
    value: ${{ steps.parse.outputs.zap_jwt_login_body }}
  zap_jwt_token_path:
    description: "Chemin jq pour extraire le JWT"
    value: ${{ steps.parse.outputs.zap_jwt_token_path }}
  zap_openapi_endpoint:
    description: "Endpoint base OpenAPI scan"
    value: ${{ steps.parse.outputs.zap_openapi_endpoint }}

runs:
  using: composite
  steps:

    - name: Vérifier que project.config.yml existe
      shell: bash
      run: |
        CONFIG_FILE="${{ inputs.projects_dir }}/${{ inputs.project }}/project.config.yml"
        if [ ! -f "$CONFIG_FILE" ]; then
          echo " ERREUR : fichier introuvable → $CONFIG_FILE"
          exit 1
        fi
        echo " Config trouvée : $CONFIG_FILE"

    - name: Vérifier et installer yq
      shell: bash
      run: |
        if ! command -v yq &>/dev/null; then
          echo "Installation de yq..."
          sudo wget -q -O /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
        fi
        echo "yq version : $(yq --version)"

    - name: Parser project.config.yml
      id: parse
      shell: bash
      run: |
        CONFIG="${{ inputs.projects_dir }}/${{ inputs.project }}/project.config.yml"

        echo "========================================================"
        echo "  PARSING — ${{ inputs.project }}"
        echo "  Fichier : $CONFIG"
        echo "========================================================"

        # ── Fonction yq robuste ───────────────────────────────────────────
        # Supporte : .project.name, .app.port, .security.fail_on_new_critical
        # Retourne le défaut si null / absent / vide
        yq_get() {
          local file="$1"
          local path="$2"
          local default="$3"
          local value
          value=$(yq e "${path} // \"\"" "$file" 2>/dev/null | tr -d '\r' | xargs)
          if [ -z "$value" ] || [ "$value" = "null" ]; then
            echo "$default"
          else
            echo "$value"
          fi
        }

        # ── Identité projet ───────────────────────────────────────────────
        PROJECT_NAME=$(yq_get "$CONFIG" ".project.name"        "${{ inputs.project }}")
        PROJECT_DESC=$(yq_get "$CONFIG" ".project.description" "")
        PROJECT_TYPE=$(yq_get "$CONFIG" ".project.type"        "nodejs")

        # ── Application ───────────────────────────────────────────────────
        APP_PORT=$(yq_get      "$CONFIG" ".app.port"             "3000")
        START_CMD=$(yq_get     "$CONFIG" ".app.start_command"    "")
        HEALTH=$(yq_get        "$CONFIG" ".app.health_check_path" "/")
        STARTUP_WAIT=$(yq_get  "$CONFIG" ".app.startup_wait"     "15")
        INSTALL_DIR_RAW=$(yq_get "$CONFIG" ".app.install_dir"    "")
        INSTALL_CMD_RAW=$(yq_get "$CONFIG" ".app.install_command" "")

        TARGET_URL="http://localhost:${APP_PORT}"

        # ── Sécurité ──────────────────────────────────────────────────────
        FAIL_CRIT=$(yq_get   "$CONFIG" ".security.fail_on_new_critical"    "true")
        FAIL_HIGH=$(yq_get   "$CONFIG" ".security.fail_on_new_high"        "false")
        SNYK_THR=$(yq_get    "$CONFIG" ".security.snyk_severity_threshold" "low")
        ZAP_TIMEOUT=$(yq_get "$CONFIG" ".security.zap_full_scan_timeout"   "30")

        ZAP_JWT_ENDPOINT=$(yq_get "$CONFIG" ".security.zap_jwt_login_endpoint" "")
        ZAP_JWT_BODY=$(yq_get     "$CONFIG" ".security.zap_jwt_login_body"     "")
        ZAP_JWT_PATH=$(yq_get     "$CONFIG" ".security.zap_jwt_token_path"     ".token")
        ZAP_OPENAPI=$(yq_get      "$CONFIG" ".security.zap_openapi_endpoint"   "")

        # ── Semgrep rulesets : liste YAML → CSV ───────────────────────────
        SEMGREP_CONFIGS=$(yq e '.security.semgrep_rulesets[]' "$CONFIG" 2>/dev/null \
          | tr '\n' ',' | sed 's/,$//' | tr -d '\r')
        [ -z "$SEMGREP_CONFIGS" ] && SEMGREP_CONFIGS="p/security-audit"

        # ── Chemins app_dir / install_dir ────────────────────────────────
        APP_DIR="${{ inputs.projects_dir }}/${{ inputs.project }}"

        if [ -n "$INSTALL_DIR_RAW" ] && [ "$INSTALL_DIR_RAW" != "null" ]; then
          INSTALL_DIR="$APP_DIR/$INSTALL_DIR_RAW"
        else
          INSTALL_DIR="$APP_DIR"
        fi

        # ── Fallback start_command par type ──────────────────────────────
        # Couvre tous les types : nodejs, python, java, static
        # Les valeurs peuvent contenir des ":" (ex: spring-boot:run, app:create)
        # → pas de problème grâce à yq
        if [ -z "$START_CMD" ] || [ "$START_CMD" = "null" ]; then
          case "$PROJECT_TYPE" in
            nodejs) START_CMD="npm start" ;;
            python) START_CMD="python app.py" ;;
            java)   START_CMD="mvn spring-boot:run" ;;
            static) START_CMD="" ;;
            *)      START_CMD="" ;;
          esac
          echo "  start_command absent → fallback : '${START_CMD}'"
        fi

        # ── Fallback install_command par type ─────────────────────────────
        if [ -z "$INSTALL_CMD_RAW" ] || [ "$INSTALL_CMD_RAW" = "null" ]; then
          case "$PROJECT_TYPE" in
            nodejs) INSTALL_CMD_RAW="npm install --no-audit --no-fund --legacy-peer-deps" ;;
            python) INSTALL_CMD_RAW="pip install -r requirements.txt" ;;
            java)   INSTALL_CMD_RAW="mvn dependency:resolve -q -DskipTests" ;;
            static) INSTALL_CMD_RAW="" ;;
            *)      INSTALL_CMD_RAW="" ;;
          esac
        fi

        # ── Validation critique ───────────────────────────────────────────
        ERRORS=0

        if [ -z "$PROJECT_TYPE" ]; then
          echo "ERREUR : project.type manquant dans $CONFIG"
          ERRORS=$((ERRORS + 1))
        fi

        if [[ ! "$PROJECT_TYPE" =~ ^(nodejs|python|java|static)$ ]]; then
          echo "ERREUR : project.type invalide → '$PROJECT_TYPE'"
          echo "         Valeurs acceptées : nodejs | python | java | static"
          ERRORS=$((ERRORS + 1))
        fi

        if [[ ! "$APP_PORT" =~ ^[0-9]+$ ]]; then
          echo "ERREUR : app.port invalide → '$APP_PORT' (doit être un entier)"
          ERRORS=$((ERRORS + 1))
        fi

        if [ "$ERRORS" -gt 0 ]; then
          echo "ERREUR : $ERRORS erreur(s) de configuration — pipeline arrêté"
          exit 1
        fi

        # ── Résumé ────────────────────────────────────────────────────────
        echo "========================================================"
        echo "  CONFIG CHARGÉE — ${{ inputs.project }}"
        echo "========================================================"
        echo "  Nom         : $PROJECT_NAME"
        echo "  Description : $PROJECT_DESC"
        echo "  Type        : $PROJECT_TYPE"
        echo "  Port        : $APP_PORT  →  $TARGET_URL"
        echo "  Start cmd   : ${START_CMD:-aucune}"
        echo "  Install dir : $INSTALL_DIR"
        echo "  Install cmd : ${INSTALL_CMD_RAW:-aucune}"
        echo "  Health      : $HEALTH"
        echo "  Startup     : ${STARTUP_WAIT}s"
        echo "  Semgrep     : $SEMGREP_CONFIGS"
        echo "  Snyk seuil  : $SNYK_THR"
        echo "  ZAP timeout : ${ZAP_TIMEOUT}min"
        echo "  Fail crit.  : $FAIL_CRIT"
        echo "  Fail high   : $FAIL_HIGH"
        echo "  ZAP JWT ep  : ${ZAP_JWT_ENDPOINT:-aucun}"
        echo "  ZAP OpenAPI : ${ZAP_OPENAPI:-aucun}"
        echo "========================================================"

        # ── Export GITHUB_OUTPUT ──────────────────────────────────────────
        {
          echo "project_name=$PROJECT_NAME"
          echo "project_description=$PROJECT_DESC"
          echo "project_type=$PROJECT_TYPE"
          echo "app_dir=$APP_DIR"
          echo "install_dir=$INSTALL_DIR"
          echo "app_port=$APP_PORT"
          echo "start_command=$START_CMD"
          echo "health_path=$HEALTH"
          echo "startup_wait=$STARTUP_WAIT"
          echo "target_url=$TARGET_URL"
          echo "fail_on_new_critical=$FAIL_CRIT"
          echo "fail_on_new_high=$FAIL_HIGH"
          echo "semgrep_configs=$SEMGREP_CONFIGS"
          echo "snyk_threshold=$SNYK_THR"
          echo "zap_timeout=$ZAP_TIMEOUT"
          echo "zap_jwt_login_endpoint=$ZAP_JWT_ENDPOINT"
          echo "zap_jwt_login_body<<EOF"
          echo "$ZAP_JWT_BODY"
          echo "EOF"
          echo "zap_jwt_token_path=$ZAP_JWT_PATH"
          echo "zap_openapi_endpoint=$ZAP_OPENAPI"
          echo "install_command=$INSTALL_CMD_RAW"
        } >> "$GITHUB_OUTPUT"