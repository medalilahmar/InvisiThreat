name: Deploy to Kubernetes (k3s)
description: >
  Action composite qui couvre les 3 phases Kubernetes :
    1. k3s-setup   — installe k3s via Ansible (idempotent)
    2. k8s-deploy  — applique tous les manifests dans le bon ordre
    3. ml-update   — copie atomique du modèle + reload API

inputs:
  namespace:
    description: Namespace Kubernetes cible
    required: false
    default: invisithreat
  registry:
    description: Registre Docker local
    required: false
    default: localhost:5000
  sha:
    description: SHA du commit (tag de l'image)
    required: true
  defectdojo_api_key:
    description: Clé API DefectDojo
    required: true
  postgres_password:
    description: Mot de passe PostgreSQL
    required: true
  jwt_secret_key:
    description: Clé secrète JWT
    required: true
  api_admin_token:
    description: Token admin de l'API FastAPI
    required: true
  gemini_api_key:
    description: Clé API Gemini
    required: true
  jira_api_token:
    description: Token API Jira
    required: true
  jira_email:
    description: Email Jira
    required: true
  jira_server:
    description: URL serveur Jira
    required: true
  run_ml_update:
    description: Exécuter fetch + preprocess + train + reload ?
    required: false
    default: "true"
  dd_url:
    description: URL de DefectDojo (pour fetch_data.py)
    required: false
    default: http://localhost:8080
  smtp_password:
    description: Mot de passe SMTP (Gmail App Password)
    required: true
  

outputs:
  node_ip:
    description: IP interne du nœud k3s
    value: ${{ steps.get_node_ip.outputs.node_ip }}
  dashboard_url:
    description: URL du dashboard
    value: ${{ steps.get_node_ip.outputs.dashboard_url }}
  api_url:
    description: URL de l'API FastAPI
    value: ${{ steps.get_node_ip.outputs.api_url }}

runs:
  using: composite
  steps:

    # ══════════════════════════════════════════════════════════════
    # PHASE 1 — k3s SETUP (idempotent via Ansible)
    # ══════════════════════════════════════════════════════════════

    - name: "[k3s] Installer k3s via Ansible (idempotent)"
      shell: bash
      working-directory: infrastructure/ansible
      run: |
        echo "::group::Ansible k3s install"
        ansible-playbook -i inventory.yml playbook-k3s-install.yml
        echo "::endgroup::"


    - name: "[k3s] Configurer kubectl"
      shell: bash
      run: |
        sudo ln -sf /usr/local/bin/k3s /usr/local/bin/kubectl
        mkdir -p ~/.kube
        sudo cp /etc/rancher/k3s/k3s.yaml ~/.kube/config
        sudo chown $(id -u):$(id -g) ~/.kube/config

    - name: "[k3s] Vérifier que kubectl fonctionne"
      shell: bash
      run: |
        echo "::group::kubectl check"
        kubectl get nodes
        kubectl get ns
        echo "::endgroup::"

    - name: "[k3s] Installer MetalLB via Ansible"
      shell: bash
      working-directory: infrastructure/ansible
      run: |
        echo "::group::Ansible MetalLB install"
        ansible-playbook -i inventory.yml playbook-metallb-install.yml
        echo "::endgroup::"

    - name: "[k3s] Installer NGINX Ingress via Ansible"
      shell: bash
      working-directory: infrastructure/ansible
      run: |
        echo "::group::Ansible NGINX Ingress install"
        ansible-playbook -i inventory.yml playbook-ingress-install.yml
        echo "::endgroup::"

    - name: "[k3s] Installer Monitoring via Ansible"
      shell: bash
      working-directory: infrastructure/ansible
      run: |
        echo "::group::Ansible Monitoring install"
        ansible-playbook -i inventory.yml playbook-monitoring-install.yml
        echo "::endgroup::"


    

    # ══════════════════════════════════════════════════════════════
    # PHASE 2 — DEPLOY KUBERNETES (ordre strict)
    # ══════════════════════════════════════════════════════════════

    - name: "[k8s] 1/8 — Namespace"
      shell: bash
      run: |
        kubectl apply -f infrastructure/kubernetes/namespace.yaml || echo "⚠️ Namespace already exists"

    - name: "[k8s] 2/8 — Secrets Kubernetes "
      shell: bash
      env:
        NS:                 ${{ inputs.namespace }}
        POSTGRES_PASSWORD:  ${{ inputs.postgres_password }}
        SECRET_KEY:         ${{ inputs.jwt_secret_key }}
        API_ADMIN_TOKEN:    ${{ inputs.api_admin_token }}
        DEFECTDOJO_API_KEY: ${{ inputs.defectdojo_api_key }}
        GEMINI_API_KEY:     ${{ inputs.gemini_api_key }}
        JIRA_API_TOKEN:     ${{ inputs.jira_api_token }}
        JIRA_EMAIL:         ${{ inputs.jira_email }}
        JIRA_SERVER:        ${{ inputs.jira_server }}
        SMTP_PASSWORD:      ${{ inputs.smtp_password }}
      run: |
        kubectl create secret generic invisithreat-secrets \
          --namespace="${NS}" \
          --dry-run=client -o yaml \
          --from-literal=POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
          --from-literal=SECRET_KEY="${SECRET_KEY}" \
          --from-literal=API_ADMIN_TOKEN="${API_ADMIN_TOKEN}" \
          --from-literal=DEFECTDOJO_API_KEY="${DEFECTDOJO_API_KEY}" \
          --from-literal=GEMINI_API_KEY="${GEMINI_API_KEY}" \
          --from-literal=JIRA_SERVER="${JIRA_SERVER}" \
          --from-literal=JIRA_EMAIL="${JIRA_EMAIL}" \
          --from-literal=JIRA_API_TOKEN="${JIRA_API_TOKEN}" \
          --from-literal=JIRA_PROJECT_KEY="INV" \
          --from-literal=JIRA_ISSUE_TYPE="Task" \
          --from-literal=JIRA_ASSIGNEE_ID="712020:eace03a0-1057-4b00-8e1f-27dd479ad83c" \
          --from-literal=JIRA_LABEL_PREFIX="invisitreat" \
          --from-literal=SMTP_HOST="smtp.gmail.com" \
          --from-literal=SMTP_PORT="587" \
          --from-literal=SMTP_USER="medalilahmar00@gmail.com" \
          --from-literal=SMTP_PASSWORD="${SMTP_PASSWORD}" \
          --from-literal=ADMIN_EMAIL="medalilahmar00@gmail.com" \
          --from-literal=FRONTEND_URL="http://invisithreat.local" \
        | kubectl apply -f -
        echo " Secret Kubernetes appliqué"

    - name: "[k8s] 3/8 — ConfigMap"
      shell: bash
      run: |
        kubectl apply -f infrastructure/kubernetes/configmap.yaml

    - name: "[k8s] 4/8 — Service ExternalName DefectDojo + patch IP"
      shell: bash
      env:
        NS: ${{ inputs.namespace }}
      run: |
        kubectl apply -f infrastructure/kubernetes/external-services.yaml

        NODE_IP=$(kubectl get nodes \
          -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
        echo "IP du nœud k3s : ${NODE_IP}"

        kubectl patch endpoints defectdojo-external \
          -n "${NS}" \
          --type='json' \
          -p="[{\"op\":\"replace\",\"path\":\"/subsets/0/addresses/0/ip\",\"value\":\"${NODE_IP}\"}]" \
        2>/dev/null || \
        kubectl apply -f - <<EOF
        apiVersion: v1
        kind: Endpoints
        metadata:
          name: defectdojo-external
          namespace: ${NS}
        subsets:
          - addresses:
              - ip: "${NODE_IP}"
            ports:
              - port: 8080
        EOF
        echo "Endpoint DefectDojo → ${NODE_IP}:8080"

    - name: "[k8s] 5/8 — PersistentVolumeClaims"
      shell: bash
      run: |
        kubectl apply -f infrastructure/kubernetes/storage/

    - name: "[k8s] 6/8 — PostgreSQL + attente ready"
      shell: bash
      env:
        NS: ${{ inputs.namespace }}
      run: |
        kubectl apply -f infrastructure/kubernetes/postgres/deployment.yaml
        kubectl apply -f infrastructure/kubernetes/postgres/service.yaml
        echo "Attente rollout PostgreSQL..."
        kubectl rollout status deployment/postgres -n "${NS}" --timeout=300s

    - name: "[k8s] 7/8 — Redis + attente ready"
      shell: bash
      env:
        NS: ${{ inputs.namespace }}
      run: |
        kubectl apply -f infrastructure/kubernetes/redis/deployment.yaml
        kubectl apply -f infrastructure/kubernetes/redis/service.yaml
        echo "Attente rollout Redis..."
        kubectl rollout status deployment/redis -n "${NS}" --timeout=300s

    - name: "[k8s] 8/8 — Risk Scoring Engine + Dashboard (rolling update)"
      shell: bash
      env:
        NS:       ${{ inputs.namespace }}
        REGISTRY: ${{ inputs.registry }}
        SHA:      ${{ inputs.sha }}
      run: |
        kubectl apply -f infrastructure/kubernetes/risk-scoring-engine/deployment.yaml
        kubectl apply -f infrastructure/kubernetes/risk-scoring-engine/service.yaml
        kubectl set image deployment/risk-scoring-engine \
          api="${REGISTRY}/invisithreat/risk-scoring-engine:${SHA}" \
          -n "${NS}"
        echo "RSE déployé — le restart ML le rendra ready après la copie du modèle"

        kubectl apply -f infrastructure/kubernetes/dashboard/deployment.yaml
        kubectl apply -f infrastructure/kubernetes/dashboard/service.yaml
        kubectl set image deployment/dashboard \
          dashboard="${REGISTRY}/invisithreat/dashboard:${SHA}" \
          -n "${NS}"
        echo "Attente rollout Dashboard..."
        kubectl rollout status deployment/dashboard -n "${NS}" --timeout=240s || true

    - name: "[k8s] Récupérer l'IP MetalLB (outputs)"
      id: get_node_ip
      shell: bash
      run: |
        NODE_IP=$(kubectl get nodes \
          -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')

        INGRESS_IP=$(kubectl get svc ingress-nginx-controller \
          -n ingress-nginx \
          -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "${NODE_IP}")

        echo "node_ip=${NODE_IP}"                          >> $GITHUB_OUTPUT
        echo "dashboard_url=http://invisithreat.local"     >> $GITHUB_OUTPUT
        echo "api_url=http://invisithreat.local"           >> $GITHUB_OUTPUT
        echo "ingress_ip=${INGRESS_IP}"                    >> $GITHUB_OUTPUT
        echo "IP nœud    : ${NODE_IP}"
        echo "IP Ingress : ${INGRESS_IP}"

    - name: "[k8s] Vérification globale des pods"
      shell: bash
      env:
        NS: ${{ inputs.namespace }}
      run: |
        echo "::group::État des pods et services"
        kubectl get pods     -n "${NS}"
        kubectl get services -n "${NS}"
        echo "::endgroup::"

    # ══════════════════════════════════════════════════════════════
    # PHASE 3 — ML RETRAIN + COPIE ATOMIQUE + RELOAD API
    # ══════════════════════════════════════════════════════════════

    - name: "[ml] Installer les dépendances Python"
      if: inputs.run_ml_update == 'true'
      shell: bash
      working-directory: risk-scoring-engine
      run: |
        echo "::group::pip install"
        python3 -m pip install --upgrade pip --quiet
        pip install -r requirements.txt --quiet
        echo "::endgroup::"

    - name: "[ml] Étape 1 — Fetch data depuis DefectDojo"
      if: inputs.run_ml_update == 'true'
      shell: bash
      working-directory: risk-scoring-engine
      env:
        DEFECTDOJO_URL:     ${{ inputs.dd_url }}
        DEFECTDOJO_API_KEY: ${{ inputs.defectdojo_api_key }}
      run: |
        echo "::group::fetch_data.py"
        python3 src/fetch_data.py
        echo "Données collectées : $(wc -l < data/raw/findings_raw.csv) findings"
        echo "::endgroup::"

    - name: "[ml] Étape 2 — Preprocessing"
      if: inputs.run_ml_update == 'true'
      shell: bash
      working-directory: risk-scoring-engine
      run: |
        echo "::group::preprocess.py"
        python3 src/preprocess.py
        echo "Données propres : $(wc -l < data/processed/findings_clean.csv) lignes"
        echo "::endgroup::"

    - name: "[ml] Étape 3 — Entraînement du modèle"
      if: inputs.run_ml_update == 'true'
      shell: bash
      working-directory: risk-scoring-engine
      run: |
        echo "::group::train.py"
        python3 src/train.py
        echo "Modèle entraîné : $(ls -lh models/pipeline_latest.pkl)"
        echo "::endgroup::"

    - name: "[ml] Upload artefacts ML"
      if: inputs.run_ml_update == 'true'
      shell: bash
      run: |
        echo "Artefacts ML disponibles localement :"
        ls -lah risk-scoring-engine/models/pipeline_latest_meta.json || true
        ls -lah risk-scoring-engine/reports/report.html || true

    - name: "[ml] Attendre que le pod FastAPI soit vivant"
      if: inputs.run_ml_update == 'true'
      id: get_pod
      shell: bash
      env:
        NS: ${{ inputs.namespace }}
      run: |
        echo "Attente que le pod RSE soit Running (liveness, pas readiness)..."
        for i in $(seq 1 30); do
          POD=$(kubectl get pods \
            -n "${NS}" \
            -l app=risk-scoring-engine \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          if [ -n "${POD}" ]; then
            echo "✅ Pod trouvé : ${POD}"
            echo "pod_name=${POD}" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Attente... (${i}/30)"
          sleep 10
        done
        echo "::error::Pod RSE introuvable après 300s"
        exit 1

    - name: "[ml] Copie atomique des artefacts vers le pod RSE"
      if: inputs.run_ml_update == 'true'
      shell: bash
      working-directory: risk-scoring-engine
      env:
        POD: ${{ steps.get_pod.outputs.pod_name }}
        NS:  ${{ inputs.namespace }}
      run: |
        echo "::group::Préparation des répertoires cibles"
        kubectl exec -n "${NS}" "${POD}" -- mkdir -p /app/data/processed
        echo "::endgroup::"

        echo "::group::Copie vers fichiers temporaires (.tmp)"
        kubectl cp models/pipeline_latest.pkl \
          ${NS}/${POD}:/app/models/pipeline_latest.pkl.tmp
        kubectl cp models/pipeline_latest_meta.json \
          ${NS}/${POD}:/app/models/pipeline_latest_meta.json.tmp
        kubectl cp data/processed/findings_clean.csv \
          ${NS}/${POD}:/app/data/processed/findings_clean.csv.tmp
        echo "::endgroup::"

        echo "::group::Activation atomique (mv — zéro downtime)"
        kubectl exec -n "${NS}" "${POD}" -- \
          mv /app/models/pipeline_latest.pkl.tmp /app/models/pipeline_latest.pkl
        kubectl exec -n "${NS}" "${POD}" -- \
          mv /app/models/pipeline_latest_meta.json.tmp /app/models/pipeline_latest_meta.json
        kubectl exec -n "${NS}" "${POD}" -- \
          mv /app/data/processed/findings_clean.csv.tmp /app/data/processed/findings_clean.csv
        echo "Transfert atomique terminé"
        echo "::endgroup::"

    - name: "[ml] Restart RSE pour charger le nouveau modèle en mémoire"
      if: inputs.run_ml_update == 'true'
      shell: bash
      env:
        NS:      ${{ inputs.namespace }}
        API_URL: ${{ steps.get_node_ip.outputs.api_url }}
      run: |
        echo "Restart du pod RSE pour charger le modèle en mémoire..."
        kubectl rollout restart deployment/risk-scoring-engine -n "${NS}"
        kubectl rollout status deployment/risk-scoring-engine -n "${NS}" --timeout=180s

        echo "Vérification /ready..."
        for i in $(seq 1 12); do
          RESP=$(curl -sf "${API_URL}/ready" 2>/dev/null || echo '{}')
          echo "Tentative ${i}/12 : ${RESP}"
          echo "${RESP}" | grep -q "healthy" && echo "✅ RSE prêt !" && exit 0
          sleep 10
        done
        echo "::warning::RSE non prêt après 120s — vérifier les logs du pod"

    - name: "[ml] Init base de données et admin"
      if: inputs.run_ml_update == 'true'
      shell: bash
      env:
        NS:              ${{ inputs.namespace }}
        API_ADMIN_TOKEN: ${{ inputs.api_admin_token }}
      run: |
        POD=$(kubectl get pods -n "${NS}" -l app=risk-scoring-engine \
          --field-selector=status.phase=Running \
          -o jsonpath='{.items[0].metadata.name}')

        if [ -z "${POD}" ]; then
          echo "::warning::Aucun pod RSE Running trouvé — skip init admin"
          exit 0
        fi

        echo "Pod RSE : ${POD}"
        kubectl exec -n "${NS}" "${POD}" -- \
          python src/create_admin.py \
            --username admin \
            --email admin@invisithreat.local \
            --password "${API_ADMIN_TOKEN}" \
        && echo "✅ Admin créé ou déjà existant" \
        || echo "::warning::create_admin.py a échoué — admin peut-être déjà existant"

    - name: "[ml] Scoring IA — predict_live.py"
      if: inputs.run_ml_update == 'true'
      shell: bash
      working-directory: risk-scoring-engine
      env:
        DEFECTDOJO_URL:     ${{ inputs.dd_url }}
        DEFECTDOJO_API_KEY: ${{ inputs.defectdojo_api_key }}
      run: |
        echo "::group::predict_live.py — scoring CSV"
        python3 src/predict_live.py \
          --use-csv \
          --csv-path data/processed/findings_clean.csv \
          --model-path models/pipeline_latest.pkl \
          --output-file logs/predictions_latest.json \
          --gate-threshold 7.0 \
          --log-level INFO
        echo "Scoring terminé :"
        python3 -c "
          import json
          with open('logs/predictions_latest.json') as f:
              d = json.load(f)
          print(f\"  Total findings scorés : {d['total']}\")
          s = d.get('summary', {}).get('by_risk_level', {})
          for level in ['critical','high','medium','low']:
              count = s.get(level, 0)
              if count:
                  print(f\"  {level.upper():<10} : {count}\")
          " || echo "Résumé non disponible"
                  echo "::endgroup::"

    - name: "[ml] Copie du cache AI scores vers le pod RSE"
      if: inputs.run_ml_update == 'true'
      shell: bash
      working-directory: risk-scoring-engine
      env:
        NS: ${{ inputs.namespace }}
      run: |
        POD=$(kubectl get pods -n "${NS}" -l app=risk-scoring-engine \
          --field-selector=status.phase=Running \
          -o jsonpath='{.items[0].metadata.name}')
        
        echo "Copie du cache AI scores vers ${POD}..."
        kubectl cp data/ai_scores_cache.json \
          ${NS}/${POD}:/app/data/ai_scores_cache.json
        echo " Cache AI scores copié"

        # Reload du cache via l'API (sans restart)
        kubectl exec -n "${NS}" "${POD}" -- \
          curl -sf -X POST http://localhost:8081/data/refresh || true
        echo " Cache rechargé"



    - name: "[ml] Vérification santé finale de l'API"
      if: inputs.run_ml_update == 'true'
      shell: bash
      env:
        API_URL: ${{ steps.get_node_ip.outputs.api_url }}
      run: |
        RESP=$(curl -sf "${API_URL}/api/ready" 2>/dev/null || echo '{}')
        echo "Ready response : ${RESPONSE}"
        echo "${RESPONSE}" | grep -q '"status":"healthy"' \
          && echo "✅ Modèle actif et prêt" \
          || echo "::warning::Modèle pas encore chargé"

        echo ""
        echo "Infos modèle :"
        curl -sf "${API_URL}/api/model/info"

    # ══════════════════════════════════════════════════════════════
    # RÉSUMÉ FINAL (toujours affiché)
    # ══════════════════════════════════════════════════════════════

    - name: "[résumé] État final du déploiement"
      if: always()
      shell: bash
      env:
        NS:            ${{ inputs.namespace }}
        DASHBOARD_URL: ${{ steps.get_node_ip.outputs.dashboard_url }}
        API_URL:       ${{ steps.get_node_ip.outputs.api_url }}
      run: |
        echo "========================================================"
        echo "  DÉPLOIEMENT K8s TERMINÉ — InvisiThreat"
        echo "========================================================"
        echo "  Dashboard    : ${DASHBOARD_URL}"
        echo "  API FastAPI  : ${API_URL}/api/docs"
        echo "  Monitoring   : http://monitoring.invisithreat.local"
        echo "  DefectDojo   : http://localhost:8080"
        echo "========================================================"
        echo ""
        echo "État des pods :"
        kubectl get pods -n "${NS}" -o wide 2>/dev/null || echo "kubectl non disponible"
        echo ""
        echo "Deployments :"
        kubectl get deployment -n "${NS}" 2>/dev/null || true
        echo ""
        echo "Événements récents :"
        kubectl get events -n "${NS}" --sort-by='.lastTimestamp' | tail -10 2>/dev/null || true