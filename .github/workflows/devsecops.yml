name: DevSecOps Pipeline - InvisiThreat (FAST MODE - Testing)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      force_retrain:
        description: "Réentraîner le modèle ML après déploiement ?"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

env:
  APP_NAME: InvisiThreat
  APP_DIR: ./juice-shop
  NAMESPACE: invisithreat
  REGISTRY: localhost:5000
  DD_URL: http://localhost:8080

# ═══════════════════════════════════════════════════════════════════
# JOB 1: BUILD AND PUSH (Docker images)
# ═══════════════════════════════════════════════════════════════════
jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: self-hosted

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "🔍 Vérifier les Dockerfiles"
        run: |
          echo "📋 Fichiers Docker détectés :"
          find . -name "Dockerfile" -type f
          ls -lah ./risk-scoring-engine/
          ls -lah ./security-dashboard/

      - name: S'assurer que le registre local est actif
        run: |
          if ! docker ps --format '{{.Names}}' | grep -q '^local-registry$'; then
            echo "🚀 Démarrage du registre Docker local..."
            docker run -d \
              --name local-registry \
              --restart=always \
              -p 5000:5000 \
              -v /opt/registry-data:/var/lib/registry \
              registry:2
            sleep 2
            echo "✅ Registre local démarré"
          else
            echo "✅ Registre local déjà actif"
          fi
          
          docker ps | grep local-registry

      - name: Build et push — Risk Scoring Engine
        run: |
          echo "🔨 Build Risk Scoring Engine..."

          # Désactiver BuildKit — utiliser le cache Docker classique
          export DOCKER_BUILDKIT=0
          

          docker build \
            --cache-from ${{ env.REGISTRY }}/invisithreat/risk-scoring-engine:latest \
            -t ${{ env.REGISTRY }}/invisithreat/risk-scoring-engine:latest \
            -t ${{ env.REGISTRY }}/invisithreat/risk-scoring-engine:${{ github.sha }} \
            ./risk-scoring-engine 2>&1 | tee build-rse.log

          BUILD_STATUS=${PIPESTATUS[0]}
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "❌ Build Risk Scoring Engine échoué"
            cat build-rse.log
            exit 1
          fi

          echo "📤 Push Risk Scoring Engine:latest..."
          docker push ${{ env.REGISTRY }}/invisithreat/risk-scoring-engine:latest

          echo "📤 Push Risk Scoring Engine:${{ github.sha }}..."
          docker push ${{ env.REGISTRY }}/invisithreat/risk-scoring-engine:${{ github.sha }}

          echo "✅ Risk Scoring Engine OK"
          docker images | grep risk-scoring-engine

      - name: Build et push — Dashboard React
        run: |
          echo "🔨 Build Dashboard React..."

          # Désactiver BuildKit — utiliser le cache Docker classique
          export DOCKER_BUILDKIT=0
          docker pull ${{ env.REGISTRY }}/invisithreat/dashboard:latest 2>/dev/null || true
          

          docker build \
            --cache-from ${{ env.REGISTRY }}/invisithreat/dashboard:latest \
            -t ${{ env.REGISTRY }}/invisithreat/dashboard:latest \
            -t ${{ env.REGISTRY }}/invisithreat/dashboard:${{ github.sha }} \
            ./security-dashboard 2>&1 | tee build-dashboard.log

          BUILD_STATUS=${PIPESTATUS[0]}
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "❌ Build Dashboard échoué"
            cat build-dashboard.log
            exit 1
          fi

          echo "📤 Push Dashboard:latest..."
          docker push ${{ env.REGISTRY }}/invisithreat/dashboard:latest

          echo "📤 Push Dashboard:${{ github.sha }}..."
          docker push ${{ env.REGISTRY }}/invisithreat/dashboard:${{ github.sha }}

          echo "✅ Dashboard OK"
          docker images | grep dashboard

      - name: "✅ Résumé Build"
        run: |
          echo ""
          echo "=========================================================="
          echo "  BUILD IMAGES — RÉSUMÉ"
          echo "=========================================================="
          echo "  Images construites :"
          docker images | grep invisithreat
          echo ""
          echo "  Registre local : ${{ env.REGISTRY }}"
          echo "  Tag            : ${{ github.sha }}"
          echo "=========================================================="

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: DEPLOY (appelle l'action composite)
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: Deploy — k3s Setup + Kubernetes + ML Update
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "📋 Afficher les inputs"
        run: |
          echo "=========================================================="
          echo "  PARAMÈTRES DE DÉPLOIEMENT"
          echo "=========================================================="
          echo "  Namespace           : ${{ env.NAMESPACE }}"
          echo "  Registre            : ${{ env.REGISTRY }}"
          echo "  SHA                 : ${{ github.sha }}"
          echo "  Force ML Retrain    : ${{ github.event.inputs.force_retrain || 'false' }}"
          echo "=========================================================="

      - name: "🚀 Deploy to Kubernetes"
        id: k8s
        uses: ./.github/actions/deploy
        with:
          namespace:          ${{ env.NAMESPACE }}
          registry:           ${{ env.REGISTRY }}
          sha:                ${{ github.sha }}
          dd_url:             ${{ env.DD_URL }}
          run_ml_update:      ${{ github.event.inputs.force_retrain || 'false' }}

          # Secrets — passés depuis GitHub Secrets
          defectdojo_api_key: ${{ secrets.DEFECTDOJO_API_KEY }}
          postgres_password:  ${{ secrets.POSTGRES_PASSWORD }}
          jwt_secret_key:     ${{ secrets.JWT_SECRET_KEY }}
          api_admin_token:    ${{ secrets.API_ADMIN_TOKEN }}
          gemini_api_key:     ${{ secrets.GEMINI_API_KEY }}
          jira_api_token:     ${{ secrets.JIRA_API_TOKEN }}
          jira_email:         ${{ secrets.JIRA_EMAIL }}
          jira_server:        ${{ secrets.JIRA_SERVER }}

      # ── Vérifications post-deploy ─────────────────────────────
      - name: "🔍 Vérifier les pods"
        if: always()
        run: |
          echo ""
          echo "=========================================================="
          echo "  VÉRIFICATION — État des pods"
          echo "=========================================================="
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide
          echo ""
          echo "=========================================================="

      - name: "🔍 Vérifier les services"
        if: always()
        run: |
          echo ""
          echo "=========================================================="
          echo "  VÉRIFICATION — Services exposés"
          echo "=========================================================="
          kubectl get services -n ${{ env.NAMESPACE }} -o wide
          echo ""
          echo "=========================================================="

      - name: "🔍 Vérifier les events k3s"
        if: always()
        run: |
          echo ""
          echo "=========================================================="
          echo "  VÉRIFICATION — Événements récents"
          echo "=========================================================="
          kubectl get events -n ${{ env.NAMESPACE }} --sort-by='.lastTimestamp'
          echo ""
          echo "=========================================================="

      - name: "🔍 Logs Risk Scoring Engine"
        if: always()
        continue-on-error: true
        run: |
          POD=$(kubectl get pods -n ${{ env.NAMESPACE }} -l app=risk-scoring-engine -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          if [ -n "$POD" ]; then
            echo ""
            echo "=========================================================="
            echo "  LOGS — Risk Scoring Engine Pod: $POD"
            echo "=========================================================="
            kubectl logs -n ${{ env.NAMESPACE }} "$POD" --tail=50 2>/dev/null || echo "❌ Pas de logs disponibles"
            echo ""
            echo "=========================================================="
          fi

      - name: "🔍 Logs Dashboard"
        if: always()
        continue-on-error: true
        run: |
          POD=$(kubectl get pods -n ${{ env.NAMESPACE }} -l app=dashboard -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          if [ -n "$POD" ]; then
            echo ""
            echo "=========================================================="
            echo "  LOGS — Dashboard Pod: $POD"
            echo "=========================================================="
            kubectl logs -n ${{ env.NAMESPACE }} "$POD" --tail=50 2>/dev/null || echo "❌ Pas de logs disponibles"
            echo ""
            echo "=========================================================="
          fi

      # ── Résumé final ──────────────────────────────────────────
      - name: "📊 Résumé final du pipeline"
        if: always()
        run: |
          DASHBOARD="${{ steps.k8s.outputs.dashboard_url }}"
          API="${{ steps.k8s.outputs.api_url }}"

          echo ""
          echo "=========================================================="
          echo "  ✅ DÉPLOIEMENT TERMINÉ — InvisiThreat"
          echo "=========================================================="
          echo ""
          echo "  📊 Informations du déploiement :"
          echo "    Namespace       : ${{ env.NAMESPACE }}"
          echo "    Registre        : ${{ env.REGISTRY }}"
          echo "    SHA             : ${{ github.sha }}"
          echo "    Mode ML Retrain : ${{ github.event.inputs.force_retrain || 'false' }}"
          echo ""
          echo "  🌐 URLs d'accès :"
          echo "    Dashboard       : ${DASHBOARD}"
          echo "    API FastAPI     : ${API}/docs"
          echo "    DefectDojo      : ${{ env.DD_URL }}"
          echo ""
          echo "  📋 Vérifications :"
          kubectl get deployment -n ${{ env.NAMESPACE }}
          echo ""
          echo "=========================================================="
          echo ""

      - name: "🧪 Test de connectivité API"
        if: always()
        continue-on-error: true
        run: |
          API="${{ steps.k8s.outputs.api_url }}"
          
          echo ""
          echo "🔗 Test /health..."
          curl -sf "${API}/health" 2>/dev/null | jq . || echo "❌ /health indisponible"
          
          echo ""
          echo "🔗 Test /docs..."
          curl -sf "${API}/docs" 2>/dev/null | head -20 || echo "❌ /docs indisponible"